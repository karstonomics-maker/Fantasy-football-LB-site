<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LATE NIGHT BLOOD BOWL</title>
  <meta name="description" content="The Leighton Buzzard Cup of Legends. Blood Bowl. Late nights. Ancient grudges. Megara Blood-Fox presiding.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>

    /* ─── TOKENS ─────────────────────────────────────────── */
    :root {
      --bg:           #060A12;
      --surface:      #0D1525;
      --surface-2:    #121E35;
      --border:       #1E3050;
      --red:          #CC1F1F;
      --red-dark:     #991515;
      --green:        #1A5C2A;
      --green-light:  #22803D;
      --blue:         #1B4FD8;
      --gold:         #B8860B;
      --gold-light:   #D4A017;
      --text:         #F0EDE6;
      --muted:        #6B7FA0;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body:    'Inter', sans-serif;
      --max-w:        1200px;
      --pad:          clamp(1rem, 4vw, 3rem);
    }

    /* ─── RESET ──────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-weight: 300;
      line-height: 1.6;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }

    /* ─── TICKER ─────────────────────────────────────────── */
    .ticker {
      background: var(--red);
      padding: 0.5rem 0;
      overflow: hidden;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .ticker-track {
      display: flex;
      white-space: nowrap;
      animation: scroll-ticker 60s linear infinite;
    }
    .ticker-track:hover { animation-play-state: paused; }
    .ticker-item {
      font-family: var(--font-display);
      font-size: 0.95rem;
      letter-spacing: 0.12em;
      color: #fff;
      padding: 0 2.5rem;
      flex-shrink: 0;
    }
    .ticker-sep { color: rgba(255,255,255,0.35); padding: 0; }
    @keyframes scroll-ticker {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* ─── NAV ────────────────────────────────────────────── */
    header { border-bottom: 1px solid var(--border); background: var(--bg); }
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem var(--pad);
      max-width: var(--max-w);
      margin: 0 auto;
    }
    .nav-logo { font-family: var(--font-display); letter-spacing: 0.06em; color: var(--text); line-height: 1; }
    .nav-logo .logo-top { font-size: 0.7rem; color: var(--muted); display: block; letter-spacing: 0.22em; }
    .nav-logo .logo-main { font-size: 1.7rem; display: block; line-height: 1; }
    .nav-logo span { color: var(--red); }
    .nav-links { display: flex; align-items: center; gap: 1.8rem; list-style: none; }
    .nav-links a {
      font-size: 0.68rem; font-weight: 500; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--muted); transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }
    .nav-social { display: flex; align-items: center; gap: 1rem; }
    .nav-social a { color: var(--muted); transition: color 0.2s; display: flex; }
    .nav-social a:hover { color: var(--red); }
    .nav-social svg { width: 18px; height: 18px; fill: currentColor; }

    /* ─── HERO ───────────────────────────────────────────── */
    .hero {
      position: relative;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
      background-size: cover;
      background-position: right center;
      background-repeat: no-repeat;
      background-color: var(--surface);
    }
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(
        to right,
        rgba(6,10,18,1)    0%,
        rgba(6,10,18,0.97) 35%,
        rgba(6,10,18,0.6)  65%,
        rgba(6,10,18,0.15) 100%
      );
      z-index: 1; pointer-events: none;
    }
    .hero::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(6,10,18,0.5) 0%, transparent 20%,
        transparent 80%, rgba(6,10,18,0.7) 100%
      );
      z-index: 1; pointer-events: none;
    }
    .hero-content {
      position: relative; z-index: 2;
      padding: clamp(4rem, 10vw, 8rem) var(--pad) clamp(4rem, 8vw, 7rem);
      max-width: var(--max-w); margin: 0 auto;
      min-height: 80vh;
      display: flex; flex-direction: column; justify-content: center;
    }
    .hero-eyebrow {
      font-size: 0.7rem; font-weight: 500; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--red); margin-bottom: 1.5rem;
      display: flex; align-items: center; gap: 0.9rem;
    }
    .hero-eyebrow::before {
      content: ''; display: inline-block; width: 28px; height: 2px;
      background: var(--red); flex-shrink: 0;
    }
    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(4.5rem, 15vw, 12rem);
      line-height: 0.88; letter-spacing: -0.01em;
      color: var(--text); margin-bottom: 2.5rem;
    }
    .hero-title em { font-style: normal; color: var(--red); }
    .hero-sub {
      max-width: 480px; font-size: 1rem; font-weight: 300;
      color: var(--muted); line-height: 1.7; margin-bottom: 2.5rem;
    }
    .hero-cta {
      display: inline-flex; align-items: center; gap: 0.6rem;
      background: var(--red); color: #fff;
      font-size: 0.75rem; font-weight: 600; letter-spacing: 0.15em;
      text-transform: uppercase; padding: 0.9rem 1.8rem; transition: background 0.2s;
    }
    .hero-cta:hover { background: var(--red-dark); }

    /* ─── THEME SONG ─────────────────────────────────────── */
    .theme-section {
      background: var(--surface); border-bottom: 1px solid var(--border); padding: 1.2rem var(--pad);
    }
    .theme-inner {
      max-width: var(--max-w); margin: 0 auto;
      display: flex; align-items: center; gap: 1.5rem;
    }
    .theme-label {
      font-family: var(--font-display); font-size: 1rem; letter-spacing: 0.15em;
      color: var(--gold-light); white-space: nowrap; flex-shrink: 0;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .theme-label svg { width: 18px; height: 18px; fill: var(--gold-light); }
    .theme-embed { flex: 1; height: 60px; }
    .theme-embed iframe { width: 100%; height: 100%; border: none; border-radius: 4px; }

    /* ─── SECTION HEADERS ────────────────────────────────── */
    .section {
      padding: clamp(3rem, 6vw, 5rem) var(--pad);
      max-width: var(--max-w); margin: 0 auto;
    }
    .section-label {
      display: flex; align-items: center; gap: 1rem; margin-bottom: 2.5rem;
    }
    .section-label h2 {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 4vw, 3rem);
      letter-spacing: 0.04em; color: var(--text);
    }
    .section-label-line { flex: 1; height: 1px; background: var(--border); }
    .section-count { font-size: 0.7rem; font-weight: 500; letter-spacing: 0.15em; color: var(--muted); }

    /* ─── MANIFESTO / WELCOME TO THE PITCH ──────────────── */
    .manifesto { border-bottom: 1px solid var(--border); background: var(--surface); }
    .manifesto-inner {
      display: grid; grid-template-columns: 300px 1fr;
      max-width: var(--max-w); margin: 0 auto;
    }
    .manifesto-label {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 3.5vw, 3rem);
      line-height: 0.92; letter-spacing: 0.04em; color: var(--text);
      padding: clamp(2rem, 5vw, 4rem) var(--pad);
      background: var(--surface-2); border-right: 1px solid var(--border);
    }
    .manifesto-label span { color: var(--red); display: block; }
    .manifesto-face-img {
      width: 100%; aspect-ratio: 3 / 4; object-fit: cover; object-position: center top;
      display: block; margin-bottom: 1.2rem;
      filter: contrast(1.08) saturate(0.88); border: 1px solid var(--border);
    }
    .manifesto-body {
      padding: clamp(2rem, 5vw, 4rem) var(--pad);
      display: flex; flex-direction: column; gap: 1rem;
    }
    .manifesto-body p { font-size: 0.98rem; color: var(--muted); line-height: 1.8; }
    .manifesto-body strong { color: var(--text); font-weight: 500; }
    .manifesto-body em { color: var(--red); font-style: normal; }
    .manifesto-pull {
      border-left: 3px solid var(--red); padding-left: 1.2rem;
      font-family: var(--font-display);
      font-size: clamp(1.3rem, 2.5vw, 1.9rem);
      letter-spacing: 0.03em; color: var(--text); margin: 0.3rem 0; line-height: 1.1;
    }

    /* ─── THE STARS ──────────────────────────────────────── */
    .credentials { border-bottom: 1px solid var(--border); }
    .cred-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 210px), 1fr));
      gap: 2px;
    }
    .cred-card {
      background: var(--surface); padding: 1.8rem 1.4rem;
      border: 1px solid transparent; transition: border-color 0.2s, background 0.2s;
    }
    .cred-card:hover { border-color: var(--border); background: var(--surface-2); }
    .cred-icon { font-size: 1.8rem; margin-bottom: 0.8rem; }
    .cred-title {
      font-family: var(--font-display); font-size: 1.15rem;
      letter-spacing: 0.06em; color: var(--text); margin-bottom: 0.6rem; line-height: 1.1;
    }
    .cred-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.6; margin-bottom: 0.6rem; }
    .cred-caveat { font-size: 0.72rem; color: var(--red); font-style: italic; }

    /* ─── THE CUP ────────────────────────────────────────── */
    .promise { background: var(--surface); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .promise-inner { max-width: var(--max-w); margin: 0 auto; padding: clamp(3rem, 6vw, 5rem) var(--pad); }
    .promise-title {
      font-family: var(--font-display);
      font-size: clamp(1.5rem, 3.5vw, 2.6rem);
      letter-spacing: 0.04em; color: var(--gold-light);
      max-width: 720px; line-height: 1; margin-bottom: 2.5rem;
    }
    .promise-body { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; }
    .promise-steps { list-style: none; display: flex; flex-direction: column; gap: 1.2rem; }
    .promise-steps li {
      display: flex; gap: 1.2rem; align-items: flex-start;
      font-size: 0.9rem; color: var(--muted); line-height: 1.6;
    }
    .promise-steps li span {
      font-family: var(--font-display); font-size: 1.6rem;
      color: var(--red); line-height: 1; flex-shrink: 0; width: 2.2rem;
    }

    /* ─── FEATURED VIDEO ─────────────────────────────────── */
    .featured-video { border-bottom: 1px solid var(--border); }
    .featured-inner { padding: clamp(3rem, 6vw, 5rem) var(--pad); max-width: var(--max-w); margin: 0 auto; }
    .featured-embed {
      position: relative; aspect-ratio: 16 / 9; background: var(--surface);
      margin-bottom: 1.5rem; overflow: hidden;
    }
    .featured-embed iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
    .featured-embed .placeholder {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 1rem; color: var(--muted); font-size: 0.85rem;
      letter-spacing: 0.1em; text-transform: uppercase; background: var(--surface-2);
    }
    .featured-embed .placeholder svg { width: 48px; height: 48px; fill: var(--border); }
    .featured-meta { display: flex; align-items: baseline; gap: 1.5rem; flex-wrap: wrap; }
    .featured-tag {
      font-size: 0.65rem; font-weight: 600; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--red);
    }
    .featured-title {
      font-family: var(--font-display); font-size: clamp(1.4rem, 3vw, 2.2rem);
      letter-spacing: 0.03em; color: var(--text);
    }
    .featured-desc { margin-top: 0.5rem; font-size: 0.9rem; color: var(--muted); max-width: 620px; }

    /* ─── VIDEO GRID ─────────────────────────────────────── */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 360px), 1fr));
      gap: 2px;
    }
    .video-card { background: var(--surface); overflow: hidden; }
    .video-card-embed { position: relative; aspect-ratio: 16 / 9; background: var(--surface-2); }
    .video-card-embed iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
    .video-card-embed .placeholder {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center; color: var(--border);
    }
    .video-card-embed .placeholder svg { width: 36px; height: 36px; fill: currentColor; }
    .video-card-info { padding: 1rem 1.2rem 1.3rem; }
    .video-card-num { font-size: 0.65rem; letter-spacing: 0.15em; color: var(--red); margin-bottom: 0.4rem; }
    .video-card-title {
      font-family: var(--font-display); font-size: 1.2rem;
      letter-spacing: 0.04em; color: var(--text); line-height: 1.1; margin-bottom: 0.4rem;
    }
    .video-card-desc { font-size: 0.8rem; color: var(--muted); line-height: 1.5; }

    /* ─── GRUDGE SUNDAY ──────────────────────────────────── */
    .grudge-section {
      background: var(--surface);
      border-top: 3px solid var(--red);
      border-bottom: 3px solid var(--red);
    }
    .grudge-inner { max-width: var(--max-w); margin: 0 auto; padding: clamp(3rem, 6vw, 5rem) var(--pad); }
    .grudge-header { display: flex; align-items: baseline; gap: 1.5rem; margin-bottom: 2.5rem; flex-wrap: wrap; }
    .grudge-header h2 {
      font-family: var(--font-display); font-size: clamp(2rem, 5vw, 4rem);
      letter-spacing: 0.04em; color: var(--text);
    }
    .grudge-header-sub {
      font-size: 0.72rem; font-weight: 500; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--muted);
    }
    .grudge-board {
      display: grid; grid-template-columns: 1fr auto 1fr; gap: 1rem;
      align-items: center; margin-bottom: 2rem;
      background: var(--surface-2); border: 1px solid var(--border); padding: 2.5rem 2rem;
    }
    .grudge-team { text-align: center; }
    .grudge-team-race {
      font-size: 0.62rem; font-weight: 600; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem;
    }
    .grudge-team-name {
      font-family: var(--font-display); font-size: clamp(1.4rem, 3vw, 2.2rem);
      letter-spacing: 0.04em; color: var(--text); margin-bottom: 1rem;
    }
    .grudge-score {
      font-family: var(--font-display); font-size: clamp(4rem, 10vw, 7rem);
      letter-spacing: -0.02em; line-height: 1; color: var(--red);
    }
    .grudge-mid { text-align: center; }
    .grudge-vs {
      font-family: var(--font-display); font-size: 0.85rem;
      letter-spacing: 0.2em; color: var(--border); margin-bottom: 0.5rem;
    }
    .grudge-draws {
      font-size: 0.65rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); background: var(--bg); border: 1px solid var(--border);
      padding: 0.3rem 0.7rem; display: inline-block; margin-bottom: 0.5rem;
    }
    .grudge-status {
      font-size: 0.88rem; color: var(--muted); line-height: 1.7;
      text-align: center; max-width: 560px; margin: 0 auto 1.8rem;
    }
    .grudge-next-wrap { text-align: center; }
    .grudge-next {
      display: inline-block; border: 1px solid var(--border); padding: 0.9rem 1.6rem;
      font-size: 0.72rem; font-weight: 500; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--text);
    }
    .grudge-next strong { color: var(--red); }

    /* ─── MATCH REPORTS ──────────────────────────────────── */
    .dispatches { border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .dispatch-list { display: flex; flex-direction: column; }
    .dispatch-item {
      display: grid; grid-template-columns: 110px 1fr; gap: 2rem;
      padding: 1.8rem 0; border-bottom: 1px solid var(--border); align-items: start;
    }
    .dispatch-item:last-child { border-bottom: none; }
    .dispatch-date {
      font-size: 0.7rem; font-weight: 500; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted); padding-top: 0.2rem;
    }
    .dispatch-text { font-size: 0.95rem; color: var(--text); line-height: 1.7; font-weight: 300; }
    .dispatch-text strong { color: var(--red); font-weight: 500; }

    /* ─── WORKSHOP ───────────────────────────────────────── */
    .workshop-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: start; }
    .workshop-block-label {
      font-size: 0.62rem; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--green-light); margin-bottom: 0.8rem; padding-bottom: 0.6rem;
      border-bottom: 1px solid var(--border); display: block;
    }
    .workshop-text { font-size: 0.92rem; color: var(--muted); line-height: 1.7; margin-bottom: 1.4rem; }
    .workshop-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }
    .stat-card { background: var(--surface); padding: 1.5rem; }
    .stat-num {
      font-family: var(--font-display); font-size: 2.5rem;
      letter-spacing: 0.02em; color: var(--text); line-height: 1; margin-bottom: 0.3rem;
    }
    .stat-num span { color: var(--red); }
    .stat-label {
      font-size: 0.7rem; font-weight: 500; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted);
    }

    /* ─── GALLERY ────────────────────────────────────────── */
    .photo-gallery { border-top: 1px solid var(--border); }
    .photo-gallery-inner { padding: clamp(3rem, 6vw, 5rem) var(--pad); max-width: var(--max-w); margin: 0 auto; }
    .photo-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; }
    .photo-item { position: relative; aspect-ratio: 1; overflow: hidden; background: var(--surface); }
    .photo-item.featured { grid-column: span 2; grid-row: span 2; }
    .photo-item img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.4s ease; filter: saturate(0.85) contrast(1.05);
    }
    .photo-item:hover img { transform: scale(1.04); }
    .photo-caption {
      position: absolute; bottom: 0; left: 0; right: 0; padding: 0.7rem 0.9rem;
      background: linear-gradient(to top, rgba(6,10,18,0.9), transparent);
      font-size: 0.75rem; color: var(--text); letter-spacing: 0.06em;
      opacity: 0; transition: opacity 0.2s;
    }
    .photo-item:hover .photo-caption { opacity: 1; }

    /* ─── FOOTER ─────────────────────────────────────────── */
    footer { border-top: 1px solid var(--border); background: var(--surface); }
    .footer-inner {
      max-width: var(--max-w); margin: 0 auto; padding: 2.5rem var(--pad);
      display: flex; align-items: center; justify-content: space-between; gap: 2rem; flex-wrap: wrap;
    }
    .footer-logo { font-family: var(--font-display); font-size: 1.1rem; letter-spacing: 0.08em; color: var(--muted); line-height: 1.2; }
    .footer-logo span { color: var(--red); }
    .footer-sub {
      display: block; font-size: 0.6rem; letter-spacing: 0.16em; color: var(--muted);
      opacity: 0.5; font-family: var(--font-body); font-weight: 300;
      margin-top: 0.2rem; text-transform: uppercase;
    }
    .footer-social { display: flex; gap: 1rem; }
    .footer-social a { color: var(--muted); transition: color 0.2s; display: flex; }
    .footer-social a:hover { color: var(--red); }
    .footer-social svg { width: 18px; height: 18px; fill: currentColor; }
    .footer-copy { font-size: 0.7rem; color: var(--muted); opacity: 0.5; letter-spacing: 0.06em; }

    /* ─── RESPONSIVE ─────────────────────────────────────── */
    @media (max-width: 768px) {
      .manifesto-inner { grid-template-columns: 1fr; }
      .manifesto-label { border-right: none; border-bottom: 1px solid var(--border); }
      .grudge-board { grid-template-columns: 1fr; }
      .grudge-score { font-size: 3rem; }
      .promise-body { grid-template-columns: 1fr; gap: 2rem; }
      .workshop-inner { grid-template-columns: 1fr; gap: 2.5rem; }
      .photo-grid { grid-template-columns: repeat(2, 1fr); }
      .photo-item.featured { grid-column: span 2; grid-row: span 1; }
      .nav-links { display: none; }
      .footer-inner { flex-direction: column; align-items: flex-start; gap: 1rem; }
    }
  </style>
</head>
<body>

<!-- ░░░ TICKER ░░░ -->
<div class="ticker">
  <div class="ticker-track" id="ticker-track"></div>
</div>

<!-- ░░░ NAV ░░░ -->
<header>
  <nav>
    <a href="#" class="nav-logo">
      <span class="logo-top">Late Night</span>
      <span class="logo-main"><span>BLOOD</span> BOWL</span>
    </a>
    <ul class="nav-links">
      <li><a href="#videos">Videos</a></li>
      <li><a href="#grudge-sundays">Grudge Sundays</a></li>
      <li><a href="#dispatches">Match Reports</a></li>
      <li><a href="#workshop">Workshop</a></li>
      <li><a href="#gallery">Gallery</a></li>
      <li><a href="#stars">The Stars</a></li>
    </ul>
    <div class="nav-social" id="nav-social"></div>
  </nav>
</header>

<!-- ░░░ HERO ░░░ -->
<section class="hero" id="hero-section"></section>

function buildSocialLinks(container) {
  Object.entries(CONTENT.social).forEach(([platform, url]) => {
    if (!url) return;
    const a = document.createElement('a');
    a.href = url; a.target = '_blank'; a.rel = 'noopener noreferrer'; a.title = platform;
    a.innerHTML = ICONS[platform] || '';
    container.appendChild(a);
  });
}

function buildHero() {
  const h = CONTENT.hero;
  const section = document.getElementById('hero-section');
  if (h.bgImage) section.style.backgroundImage = `url('${h.bgImage}')`;
  section.innerHTML = `
    <div class="hero-content">
      <p class="hero-eyebrow">${h.eyebrow}</p>
      <h1 class="hero-title">${h.line1}<br><em>${h.line2}</em><br>${h.line3}</h1>
      <p class="hero-sub">${h.sub}</p>
      <a href="#videos" class="hero-cta">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        ${h.btnText}
      </a>
    </div>`;
}

function buildTheme() {
  const t = CONTENT.theme;
  if (!t || !t.youtubeId) return;
  document.getElementById('theme-section').style.display = 'block';
  document.getElementById('theme-embed').innerHTML =
    `<iframe src="https://www.youtube.com/embed/${t.youtubeId}" allow="autoplay" allowfullscreen loading="lazy"></iframe>`;
}

function buildTicker() {
  const items = [...CONTENT.ticker, ...CONTENT.ticker];
  const track = document.getElementById('ticker-track');
  items.forEach(text => {
    const span = document.createElement('span');
    span.className = 'ticker-item'; span.textContent = text;
    track.appendChild(span);
    const sep = document.createElement('span');
    sep.className = 'ticker-item ticker-sep'; sep.textContent = '·';
    track.appendChild(sep);
  });
}

function videoEmbed(id) {
  if (id) {
    return `<iframe src="https://www.youtube.com/embed/${id}"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen loading="lazy"></iframe>`;
  }
  return `<div class="placeholder">
    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    <span>Add your YouTube video ID</span>
  </div>`;
}

function buildFeatured() {
  const v = CONTENT.videos[0];
  if (!v) return;
  document.getElementById('featured-embed').innerHTML = videoEmbed(v.id);
  document.getElementById('featured-meta').innerHTML = `
    <div class="featured-meta">
      <span class="featured-tag">Latest</span>
      <div>
        <div class="featured-title">${v.title}</div>
        <div class="featured-desc">${v.description}</div>
      </div>
    </div>`;
}

function buildArchive() {
  const archive = CONTENT.videos.slice(1);
  document.getElementById('video-count').textContent = `${archive.length} videos`;
  const grid = document.getElementById('video-grid');
  archive.forEach((v, i) => {
    const card = document.createElement('div');
    card.className = 'video-card';
    card.innerHTML = `
      <div class="video-card-embed">${videoEmbed(v.id)}</div>
      <div class="video-card-info">
        <div class="video-card-num">${v.episode || `EP. ${String(i + 2).padStart(2, '0')}`}</div>
        <div class="video-card-title">${v.title}</div>
        <div class="video-card-desc">${v.description}</div>
      </div>`;
    grid.appendChild(card);
  });
}

function buildManifesto() {
  const { paragraphs, pullQuote, faceImage } = CONTENT.manifesto;
  const faceEl = document.getElementById('manifesto-face');
  if (faceEl && faceImage) {
    const img = document.createElement('img');
    img.src = faceImage; img.alt = 'Megara Blood-Fox';
    img.className = 'manifesto-face-img';
    faceEl.appendChild(img);
  }
  const el = document.getElementById('manifesto-body');
  paragraphs.forEach((p, i) => {
    if (i === 1) {
      const pull = document.createElement('blockquote');
      pull.className = 'manifesto-pull'; pull.textContent = pullQuote;
      el.appendChild(pull);
    }
    const para = document.createElement('p');
    para.innerHTML = p;
    el.appendChild(para);
  });
}

        ${steps.map(s => `<li><span>${s.num}</span>${s.text}</li>`).join('')}
      </ul>
      <p style="font-size:0.88rem;color:var(--muted);line-height:1.7;font-style:italic;border-left:3px solid var(--red);padding-left:1.2rem;">${caveat}</p>
    </div>`;
}

function buildWorkshop() {
  const w = CONTENT.workshop;
  function makeStats(stats) {
    return `<div class="workshop-stats">
      ${(stats || []).map(s => `
        <div class="stat-card">
          <div class="stat-num">${s.num}<span>${s.unit}</span></div>
          <div class="stat-label">${s.label}</div>
        </div>`).join('')}
    </div>`;
  }
  document.getElementById('workshop-inner').innerHTML = `
    <div>
      <span class="workshop-block-label">3D PRINTING</span>
      <p class="workshop-text">${w.blurb3d}</p>
      ${makeStats(w.stats3d)}
    </div>
    <div>
      <span class="workshop-block-label">PAINTING</span>
      <p class="workshop-text">${w.blurbPaint}</p>
      ${makeStats(w.statsPaint)}
    </div>`;
}

function buildPhotos() {
  const photos = CONTENT.photos;
  if (!photos || photos.length === 0) return;
  const grid = document.getElementById('photo-grid');
  photos.forEach(p => {
    const item = document.createElement('div');
    item.className = 'photo-item' + (p.featured ? ' featured' : '');
    item.innerHTML = `
      <img src="${p.src}" alt="${p.caption || 'Late Night Blood Bowl'}" loading="lazy">
      ${p.caption ? `<div class="photo-caption">${p.caption}</div>` : ''}`;
    grid.appendChild(item);
  });
}

function buildSocial() {
  buildSocialLinks(document.getElementById('nav-social'));
  buildSocialLinks(document.getElementById('footer-social'));
}

function buildFooter() {
  document.getElementById('footer-copy').textContent =
    `© ${new Date().getFullYear()} This website is completely unofficial and in no way endorsed by Games Workshop Limited. Blood Bowl is a copyrighted product of Games Workshop and no rights are contested by this web page or its contents. Games Workshop, the Games Workshop logo, Blood Bowl, and the Blood Bowl logo are trademarks of Games Workshop Limited.`;
}

buildTicker();
buildHero();
buildTheme();
buildManifesto();
buildCredentials();
buildPromise();
buildFeatured();
buildArchive();
buildGrudge();
buildDispatches();
buildWorkshop();
buildPhotos();
buildSocial();
buildFooter();

</script>
</body>
</html>
